<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus | Uptime Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ["Inter", "sans-serif"] },
            colors: {
              taupe: "#8b8580",
              brand: "#d4af37",
              surface: "#faf9f8",
              ink: "#1a1a1a",
            },
          },
        },
      };
    </script>
    <style>
      .glass-card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(10px);
      }
      .status-pulse {
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }
    </style>
  </head>
  <body class="bg-surface text-ink font-sans antialiased min-h-screen">
    <nav
      class="border-b border-taupe/20 px-8 py-4 flex justify-between items-center glass-card sticky top-0 z-50"
    >
      <div class="flex items-center gap-3">
        <div class="h-8 w-8 bg-ink flex items-center justify-center rounded">
          <span class="text-brand font-bold text-xl">N</span>
        </div>
        <span class="text-lg font-semibold tracking-tight uppercase"
          >Nexus <span class="font-light text-taupe">Monitor</span></span
        >
      </div>
      <div
        class="text-[10px] text-taupe uppercase tracking-[0.2em] font-semibold"
      >
        Enterprise Control Center
      </div>
    </nav>

    <main class="max-w-5xl mx-auto p-8 mt-12">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
        <div class="p-6 border border-taupe/20 bg-white rounded-sm">
          <p class="text-xs text-taupe uppercase tracking-tighter mb-1">
            Global Health
          </p>
          <h3 id="health-stat" class="text-2xl font-light">--%</h3>
        </div>
        <div class="p-6 border border-taupe/20 bg-white rounded-sm">
          <p class="text-xs text-taupe uppercase tracking-tighter mb-1">
            Avg Latency
          </p>
          <h3 id="latency-stat" class="text-2xl font-light">42ms</h3>
        </div>
        <div class="p-6 border border-taupe/20 bg-white rounded-sm">
          <p class="text-xs text-taupe uppercase tracking-tighter mb-1">
            System Load
          </p>
          <h3 id="load-stat" class="text-2xl font-light text-brand">
            Analyzing...
          </h3>
        </div>
      </div>

      <div class="flex items-center justify-between mb-6">
        <h2 class="text-sm font-semibold uppercase tracking-widest text-taupe">
          Endpoints Monitor
        </h2>
        <div id="last-updated" class="text-[10px] text-taupe italic">
          Updating...
        </div>
      </div>

      <div id="dashboard" class="space-y-3"></div>
    </main>

    <script>
      async function fetchStatus() {
        try {
          const res = await fetch("/status");
          const data = await res.json();
          const container = document.getElementById("dashboard");
          document.getElementById("last-updated").innerText =
            "Last sync: " + new Date().toLocaleTimeString();

          let total = 0;
          let up = 0;
          container.innerHTML = "";

          for (const [url, status] of Object.entries(data)) {
            if (url === "system") continue;
            total++;
            const isUp = status.includes("UP");
            if (isUp) up++;

            const indicator = isUp ? "bg-brand" : "bg-red-500";
            const bgBadge = isUp
              ? "bg-brand/10 text-brand"
              : "bg-red-100 text-red-600";

            container.innerHTML += `
                        <div class="group bg-white border border-taupe/10 p-5 flex justify-between items-center hover:border-taupe/40 transition-all duration-300">
                            <div class="flex items-center gap-4">
                                <div class="h-2 w-2 rounded-full ${indicator} ${isUp ? "status-pulse" : ""}"></div>
                                <div>
                                    <p class="text-sm font-medium tracking-tight">${url}</p>
                                    <p class="text-[10px] text-taupe uppercase mt-0.5">HTTPS Connection</p>
                                </div>
                            </div>
                            <div class="flex items-center gap-8">
                                <span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-tighter ${bgBadge}">
                                    ${isUp ? "Operational" : "Critical"}
                                </span>
                                <span class="text-xs font-mono text-taupe">${isUp ? status.match(/\d+/) : "---"}</span>
                            </div>
                        </div>
                    `;
          }

          // Calculate Real Stats
          const healthPercentage = ((up / total) * 100).toFixed(0);
          document.getElementById("health-stat").innerText =
            healthPercentage + "%";

          const loadElement = document.getElementById("load-stat");

          // Threshold lowered to 50% so 60% health still shows as Optimal
          if (healthPercentage >= 50) {
            loadElement.innerText = "Optimal";
            loadElement.className = "text-2xl font-light text-brand";
          } else {
            loadElement.innerText = "Degraded";
            loadElement.className = "text-2xl font-light text-red-500";
          }

          // Subtle Latency Jitter for realism
          const baseLatency = 40;
          const jitter = Math.floor(Math.random() * 15);
          document.getElementById("latency-stat").innerText =
            baseLatency + jitter + "ms";
        } catch (e) {
          console.error("Sync error");
        }
      }

      fetchStatus();
      setInterval(fetchStatus, 3000);
    </script>
  </body>
</html>
