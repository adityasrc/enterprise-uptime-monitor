name: Enterprise Uptime Monitor Pipeline

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Grabs your code from the GitHub repository
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Sets up Java & uses Caching for faster builds (Syllabus hit)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # 3. Automates the Maven Build
    - name: Build Java App with Maven
      run: mvn clean package

   # 4. Logs into Docker Hub securely using Secrets
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}


    # 5. Builds the Image AND Pushes it to Docker Hub (Syllabus hit)
    - name: Build and Push Docker Image
      run: |
        docker build -t adityaprakashx/uptime-monitor:latest .
        docker push adityaprakashx/uptime-monitor:latest