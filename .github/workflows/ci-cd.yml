name: Enterprise Uptime Monitor Pipeline

# Triggers the workflow on push or pull request events to the main branch
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-dockerize:
    runs-on: ubuntu-latest

    steps:
    # 1. Grabs your code from the GitHub repository
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Sets up the Java environment needed for Maven
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # 3. Automates the Maven Build 
    # (Fulfills Evaluation Criteria: Build automation and pipeline configuration)
    - name: Build Java App with Maven
      run: mvn clean package

    # 4. Automates the Docker Build
    # (Fulfills Evaluation Criteria: Integration of the selected tools)
    - name: Build Docker Image
      run: docker build -t adityaprakash/uptime-monitor:latest .

    # 5. Verifies the Docker image was created successfully
    # (Fulfills Evaluation Criteria: Successful execution with proper outputs/logs)
    - name: Verify Docker Build
      run: docker images | grep uptime-monitor